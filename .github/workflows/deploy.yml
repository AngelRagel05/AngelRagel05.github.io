name: Deploy

on:
  # Solo publica cuando los cambios llegan a main.
  push:
    branches:
      - main

# Permisos minimos necesarios para publicar en GitHub Pages con OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultaneos sobre el mismo entorno de Pages.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Descarga el codigo del repositorio en el runner.
      - name: Checkout
        uses: actions/checkout@v7

      # Usa la version LTS estable de Node.js y cachea npm.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      # Instala exactamente las dependencias definidas en package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Genera dist; si el build falla, no se sube ningun artefacto.
      - name: Build
        run: npm run build

      # Prepara la configuracion oficial de GitHub Pages para Actions.
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Sube la carpeta generada por Vite como artefacto de Pages.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      # Publica el artefacto en el entorno github-pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
